<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            background-color: blueviolet;
            color: aliceblue;
            width:150px
            ;
            margin: 5px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Calculator 🧮</h1>
    🌸 Num 1 <input type="number" id="a"> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 🌸 Num 2 <input type="number" id="b"> <br><br>
    <button onclick="add()" >ADDITION</button><br>
     <button  onclick="sub()">SUBTRACTION</button><br>
      <button onclick="mul()" >MULTIPLICATION</button><br>
       <button onclick="div()">DIVISION</button><br>

<div id="result"></div>

       <script>
        function add(){
            let a=parseInt(document.getElementById("a").value);
           let b=parseInt(document.getElementById("b").value);
           let c=a+b;
           document.getElementById("result").innerText=`ADDITION: ${c}`
        }
         function sub(){
            let a=parseInt(document.getElementById("a").value);
           let b=parseInt(document.getElementById("b").value);
           let c=a-b;
           document.getElementById("result").innerText=`SUBTRACTION: ${c}`
        }
         function mul(){
            let a=parseInt(document.getElementById("a").value);
           let b=parseInt(document.getElementById("b").value);
           let c=a*b;
           document.getElementById("result").innerText=`MULTIPLICATION: ${c}`
        }
         function div(){
            let a=parseInt(document.getElementById("a").value);
           let b=parseInt(document.getElementById("b").value);
           let c=a/b;
           document.getElementById("result").innerText=`DIVISION: ${c}`
        }

       
        
       </script>
</body>


</html>
